<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEIAF - Control de Bar</title>
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #2ecc71; --d: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        .loader { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:flex; align-items:center; justify-content:center; border-radius:12px; z-index:10; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; color: white; margin-top:5px; }
        .btn-blue { background: var(--a); } .btn-red { background: var(--d); } .btn-green { background: var(--s); }
        .res-list { border: 1px solid #ddd; max-height: 180px; overflow-y: auto; display: none; background: white; position: absolute; width: calc(100% - 40px); z-index: 100; }
        .res-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .res-item:hover { background: #f1f9ff; }
        .tabs { display: flex; gap: 5px; margin: 15px 0; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab.active { background: var(--a); color: white; }
        .table-wrap { max-height: 350px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .del-btn { color: var(--d); cursor: pointer; border: none; background: none; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <!-- REGISTRO -->
    <div class="card">
        <div id="loadV" class="loader" style="display:none;">Procesando...</div>
        <h2>🍴 Registro de Consumo</h2>
        <input type="text" id="busV" placeholder="🔎 ID o Nombre del niño..." oninput="buscar(this, 'resV')">
        <div id="resV" class="res-list"></div>
        
        <div id="selLabel" style="padding:15px; background:#e3f2fd; color:#1565c0; border-radius:8px; font-weight:bold; margin: 10px 0;">
            Alumno: Ninguno seleccionado
        </div>

        <select id="prdSelect"></select>
        <button class="btn btn-blue" onclick="guardar()">💾 GUARDAR CONSUMO</button>

        <h2 style="margin-top:25px;">📊 Historial Alumno</h2>
        <div class="tabs">
            <div id="tab-hoy" class="tab active" onclick="setPeriodo('hoy')">Hoy</div>
            <div id="tab-semana" class="tab" onclick="setPeriodo('semana')">Semana</div>
            <div id="tab-mes" class="tab" onclick="setPeriodo('mes')">Mes</div>
        </div>
        <div id="hist" class="table-wrap">Selecciona un niño...</div>
    </div>

    <!-- ADMIN -->
    <div class="card">
        <div id="loadA" class="loader">Sincronizando...</div>
        <h2>⚙️ Gestión Menú y Alumnos</h2>
        
        <button class="btn btn-green" onclick="toggle('fEst')">+ Nuevo Alumno</button>
        <div id="fEst" style="display:none; padding:10px; background:#f9f9f9; border-radius:8px;">
            <input type="text" id="nID" placeholder="ID">
            <input type="text" id="nNom" placeholder="Nombre completo">
            <button class="btn btn-green" onclick="crearEst()">Guardar</button>
        </div>

        <button class="btn btn-blue" style="margin-top:10px;" onclick="toggle('fPrd')">🍲 Gestionar Platos</button>
        <div id="fPrd" style="display:none; padding:10px; background:#f9f9f9; border-radius:8px;">
            <input type="text" id="npN" placeholder="Plato">
            <input type="number" id="npP" placeholder="Precio">
            <button class="btn btn-blue" onclick="crearPrd()">Añadir</button>
        </div>

        <h3>Lista de Alumnos</h3>
        <input type="text" id="fLista" placeholder="Buscar en lista..." oninput="renderLista()">
        <div id="listaEst" class="table-wrap"></div>
    </div>
</div>

<script>
    const API = "TU_NUEVA_URL_AQUI"; // <--- PEGA AQUÍ LA URL QUE COPIASTE
    let dbEst = [], dbVent = [], dbPrd = [], sID = "", sNom = "", PERIODO = "hoy";

    async function cargar() {
        try {
            const r = await fetch(API);
            const d = await r.json();
            dbEst = d.est; dbVent = d.vent; dbPrd = d.prd;
            renderLista(); renderPrd();
            if(sID) renderHist();
            document.getElementById('loadA').style.display = 'none';
        } catch(e) { 
            document.getElementById('loadA').innerHTML = "<b style='color:red'>Error de Conexión: Publica como 'Anyone' en Google Script.</b>"; 
        }
    }
    window.onload = cargar;

    function toggle(id) {
        const x = document.getElementById(id);
        x.style.display = x.style.display === 'none' ? 'block' : 'none';
    }

    function setPeriodo(p) {
        PERIODO = p;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+p).classList.add('active');
        renderHist();
    }

    function buscar(el, resId) {
        const v = el.value.toLowerCase();
        const r = document.getElementById(resId);
        r.innerHTML = '';
        if(v.length < 2) { r.style.display='none'; return; }
        const f = dbEst.filter(e => e.nombre.toLowerCase().includes(v) || e.id.toString().includes(v));
        f.forEach(e => {
            const d = document.createElement('div');
            d.className = 'res-item';
            d.innerText = e.nombre;
            d.onclick = () => {
                sID = e.id; sNom = e.nombre;
                document.getElementById('selLabel').innerText = "✅ " + sNom;
                renderHist();
                r.style.display='none'; el.value='';
            };
            r.appendChild(d);
        });
        r.style.display = 'block';
    }

    function renderHist() {
        if(!sID) return;
        const hoy = new Date();
        const filtradas = dbVent.filter(v => {
            if(v.id.toString() !== sID.toString()) return false;
            const fV = new Date(v.fecha);
            if(PERIODO === 'hoy') return fV.toDateString() === hoy.toDateString();
            if(PERIODO === 'semana') return (hoy - fV) / (1000*60*60*24) <= 7;
            if(PERIODO === 'mes') return (hoy - fV) / (1000*60*60*24) <= 30;
            return true;
        });

        let h = "<table><tr><th>Fecha</th><th>Plato</th><th>🗑️</th></tr>";
        filtradas.reverse().forEach(v => {
            h += `<tr>
                <td>${new Date(v.fecha).toLocaleDateString()}</td>
                <td>${v.prd}</td>
                <td><button class="del-btn" onclick="borrarConsumo(${v.row})">🗑️</button></td>
            </tr>`;
        });
        document.getElementById('hist').innerHTML = h + "</table>";
    }

    async function borrarConsumo(row) {
        if(!confirm("¿Borrar este registro?")) return;
        document.getElementById('loadV').style.display='block';
        await fetch(API, {method:'POST', body: JSON.stringify({action:'delVent', row: row})});
        cargar();
        document.getElementById('loadV').style.display='none';
    }

    async function guardar() {
        if(!sID) return alert("Selecciona un alumno");
        document.getElementById('loadV').style.display='block';
        await fetch(API, {method:'POST', body: JSON.stringify({id:sID, nom:sNom, prd: document.getElementById('prdSelect').value})});
        cargar();
        document.getElementById('loadV').style.display='none';
    }

    function renderLista() {
        const f = document.getElementById('fLista').value.toLowerCase();
        const l = dbEst.filter(e => e.nombre.toLowerCase().includes(f));
        let h = "<table>";
        l.forEach(e => h += `<tr><td>${e.nombre}</td></tr>`);
        document.getElementById('listaEst').innerHTML = h + "</table>";
    }

    function renderPrd() {
        document.getElementById('prdSelect').innerHTML = dbPrd.map(p => `<option value="${p.nombre} ($${p.precio})">${p.nombre} ($${p.precio})</option>`).join('');
    }

    async function crearEst() {
        const id = document.getElementById('nID').value;
        const nom = document.getElementById('nNom').value;
        await fetch(API, {method:'POST', body: JSON.stringify({action:'addEst', id, nom})});
        location.reload();
    }
</script>
</body>
</html>
