<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Comedor CEIAF - Pro</title>
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #2ecc71; --d: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--p); border-bottom: 3px solid var(--a); padding-bottom: 10px; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        
        /* Botones Originales */
        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-reg { background: var(--a); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-reg:hover { background: #2980b9; transform: translateY(-2px); }
        
        /* Búsqueda Predictiva */
        .search-res { border: 1px solid #ddd; max-height: 150px; overflow-y: auto; display: none; background: white; position: absolute; width: 85%; z-index: 10; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .res-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .res-item:hover { background: #f0f7ff; }

        .loader { display: none; color: var(--a); font-weight: bold; text-align: center; padding: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍴 Sistema de Registro - Comedor</h2>
    
    <div id="loading" class="loader">⌛ Procesando...</div>

    <div class="section">
        <h3>🔍 Buscar Estudiante (ID o Nombre)</h3>
        <div style="position: relative;">
            <input type="text" id="bus" placeholder="Empieza a escribir..." oninput="buscar()">
            <div id="res" class="search-res"></div>
        </div>
        <p id="estSel" style="font-weight: bold; color: var(--a); margin-top: 10px;">Seleccionado: Ninguno</p>
    </div>

    <div class="section">
        <h3>🛒 Punto de Venta</h3>
        <div class="grid-buttons">
            <button class="btn-reg" onclick="prepararEnvio('Almuerzo Completo', 3.50)">Almuerzo ($3.50)</button>
            <button class="btn-reg" onclick="prepararEnvio('Medio Almuerzo', 2.00)">Medio ($2.00)</button>
            <button class="btn-reg" onclick="prepararEnvio('Sopa', 1.00)">Sopa ($1.00)</button>
            <button class="btn-reg" onclick="prepararEnvio('Lunch', 1.50)">Lunch ($1.50)</button>
        </div>
    </div>

    <div class="section">
        <h3>📊 Últimos Consumos del Alumno</h3>
        <div id="hist">Selecciona un alumno para ver su historial...</div>
    </div>
</div>

<script>
    // 🔗 REEMPLAZA ESTO CON TU LINK DE GOOGLE
    const URL_API = "TU_LINK_DE_GOOGLE_AQUÍ"; 

    let dbEst = [], dbVent = [], selID = "", selNom = "";

    async function cargar() {
        const r = await fetch(URL_API + "?q=todo");
        const d = await r.json();
        dbEst = d.est; dbVent = d.vent;
    }

    function buscar() {
        const v = document.getElementById('bus').value.toLowerCase();
        const r = document.getElementById('res');
        r.innerHTML = '';
        if(v.length < 2) { r.style.display='none'; return; }
        const f = dbEst.filter(e => e.id.toString().toLowerCase().includes(v) || e.nombre.toLowerCase().includes(v));
        f.forEach(e => {
            const d = document.createElement('div');
            d.className = 'res-item';
            d.innerText = `${e.id} | ${e.nombre}`;
            d.onclick = () => {
                selID = e.id; selNom = e.nombre;
                document.getElementById('estSel').innerText = "Seleccionado: " + selNom;
                document.getElementById('res').style.display = 'none';
                document.getElementById('bus').value = '';
                verHistorial();
            };
            r.appendChild(d);
        });
        r.style.display = 'block';
    }

    async function prepararEnvio(prod, precio) {
        if(!selID) return alert("❌ Primero busca y selecciona un estudiante");
        
        document.getElementById('loading').style.display = 'block';
        const fila = { id: selID, nom: selNom, prd: prod, pre: precio, met: "Efectivo", com: "-", ban: "-" };

        try {
            await fetch(URL_API, { method: 'POST', body: JSON.stringify(fila) });
            alert("✅ ¡Registrado!");
            dbVent.push({fecha: new Date().toLocaleString(), ...fila});
            verHistorial();
        } catch(e) { alert("Error al guardar"); }
        document.getElementById('loading').style.display = 'none';
    }

    function verHistorial() {
        const f = dbVent.filter(v => v.id == selID);
        let h = '<table><tr><th>Fecha</th><th>Producto</th></tr>';
        f.reverse().slice(0,5).forEach(v => {
            h += `<tr><td>${v.fecha.split(',')[0]}</td><td>${v.prd}</td></tr>`;
        });
        document.getElementById('hist').innerHTML = f.length ? h + '</table>' : 'Sin consumos hoy';
    }

    window.onload = cargar;
</script>
</body>
</html>
