<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA BAR CEIAF - V5</title>
    <style>
        :root { --p: #2C3E50; --a: #3498DB; --s: #2ECC71; --d: #E74C3C; --bg: #F4F7F6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); text-transform: uppercase; font-size: 11px; margin: 0; }
        .navbar { background: var(--p); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1400px; margin: 20px auto; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; padding: 0 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Selección Múltiple */
        .prd-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 15px 0; max-height: 400px; overflow-y: auto; border: 1px solid #EEE; padding: 10px; border-radius: 8px; }
        .prd-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #F0F0F0; background: #FFF; }
        .prd-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .prd-controls { display: flex; align-items: center; gap: 8px; }
        .qty-btn { width: 30px; height: 30px; border-radius: 5px; border: 1px solid #DDD; cursor: pointer; background: white; font-weight: bold; }
        .fecha-mod { font-size: 8px; color: #999; display: block; margin-top: 2px; }

        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:2000; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; text-align: center; }
        
        .badge-id { font-family: monospace; background: #EEE; padding: 4px 8px; border-radius: 4px; font-weight: bold; color: var(--p); }
        .hidden { display: none; }
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }
    </style>
</head>
<body>

<div class="navbar">
    <b>BAR CEIAF - GESTIÓN DE CONSUMOS</b>
    <button style="background:#34495E; color:white; border:none; padding:8px; cursor:pointer;" onclick="toggle('modalAdmin')">⚙️ ADM. PERIODO</button>
</div>

<div class="container">
    <div class="card">
        <h2>🛒 REGISTRO MÚLTIPLE</h2>
        <input type="text" id="busV" placeholder="🔎 BUSCAR ALUMNO (NOMBRE, APELLIDO O NIVEL)..." oninput="buscarInteligente(this)">
        <div id="resV" style="position:absolute; background:white; z-index:100; width:300px; border:1px solid #DDD; display:none;"></div>
        
        <div id="selLabel" style="padding:15px; background:#E3F2FD; color:#1565C0; font-weight:bold; margin:10px 0; border-radius:6px;">
            ALUMNO: NO SELECCIONADO
        </div>

        <h3>SELECCIONE PRODUCTOS:</h3>
        <div id="contenedorProductos" class="prd-grid">
            <!-- Cargado dinámicamente -->
        </div>

        <select id="pagoMetodo" onchange="togglePagoExtra()">
            <option value="EFECTIVO">PAGO: EFECTIVO</option>
            <option value="TRANSFERENCIA">PAGO: TRANSFERENCIA</option>
        </select>
        <div id="extraPago" class="hidden">
            <input type="text" id="pagoBanco" placeholder="BANCO">
            <input type="text" id="pagoCompro" placeholder="COMPROBANTE">
        </div>

        <button class="btn btn-blue" style="background:var(--s); padding:15px; margin-top:10px;" onclick="preConfirmar()">✔️ REVISAR Y GUARDAR CONSUMO</button>
    </div>

    <div class="card">
        <h2>📦 GESTIÓN DE PRODUCTOS</h2>
        <div id="listaPrdAdmin" class="prd-grid"></div>
        <hr>
        <h4>AÑADIR NUEVO PLATO</h4>
        <input type="text" id="newPNom" placeholder="NOMBRE">
        <input type="number" id="newPPre" placeholder="PRECIO">
        <button class="btn btn-blue" onclick="crearPrd()">AÑADIR AL SISTEMA</button>
    </div>
</div>

<!-- MODAL DE CONFIRMACIÓN -->
<div id="modalConfirma" class="modal">
    <div class="modal-content">
        <h3>🚨 CONFIRMAR PEDIDO</h3>
        <div id="detalleConfirma" style="text-align:left; background:#F9F9F9; padding:15px; border-radius:8px; margin:15px 0;"></div>
        <p>CÓDIGO ÚNICO: <span id="codUnicoDisplay" class="badge-id">---</span></p>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-red" onclick="toggle('modalConfirma')">CANCELAR</button>
            <button class="btn btn-green" onclick="finalizarGuardado()">CONFIRMAR Y GUARDAR</button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbyJ9SLVbw0InuSMoAOlzUoIQGNCj3NjV0QLyR2BNTZS5q4EfsjgbF7LvWuyj4TTrwwJ/exec";
    let dbEst = [], dbVent = [], dbPrd = [], sID = "", sNom = "", itemsSeleccionados = {};

    async function cargar() {
        const r = await fetch(API);
        const d = await r.json();
        dbEst = d.est; dbVent = d.vent; dbPrd = d.prd;
        renderProductos();
        renderAdminPrd();
    }
    window.onload = cargar;

    function renderProductos() {
        const cont = document.getElementById('contenedorProductos');
        cont.innerHTML = dbPrd.map(p => {
            const fecha = p.fechaMod ? new Date(p.fechaMod).toLocaleDateString() : '---';
            return `
                <div class="prd-item">
                    <div class="prd-info">
                        <input type="checkbox" id="chk_${p.nombre}" onchange="toggleItem('${p.nombre}')">
                        <div>
                            <b>${p.nombre}</b> <span style="color:var(--s)">$${p.precio}</span>
                            <span class="fecha-mod">ACTUALIZACIÓN: ${fecha}</span>
                        </div>
                    </div>
                    <div class="prd-controls">
                        <button class="qty-btn" onclick="modQty('${p.nombre}', -1)">-</button>
                        <b id="qty_${p.nombre}">1</b>
                        <button class="qty-btn" onclick="modQty('${p.nombre}', 1)">+</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleItem(nom) {
        if(document.getElementById(`chk_${nom}`).checked) {
            itemsSeleccionados[nom] = parseInt(document.getElementById(`qty_${nom}`).innerText);
        } else {
            delete itemsSeleccionados[nom];
        }
    }

    function modQty(nom, val) {
        const el = document.getElementById(`qty_${nom}`);
        let n = Math.max(1, parseInt(el.innerText) + val);
        el.innerText = n;
        if(itemsSeleccionados[nom]) itemsSeleccionados[nom] = n;
    }

    function generarCodigo() {
        return 'CEIAF-' + Math.random().toString(36).substr(2, 9).toUpperCase();
    }

    function preConfirmar() {
        if(!sID) return alert("SELECCIONE UN ALUMNO");
        if(Object.keys(itemsSeleccionados).length === 0) return alert("SELECCIONE AL MENOS UN PRODUCTO");

        let html = `<b>ALUMNO:</b> ${sNom}<br><br><b>RESUMEN:</b><br>`;
        for(let prd in itemsSeleccionados) {
            html += `• ${prd} (x${itemsSeleccionados[prd]})<br>`;
        }
        
        document.getElementById('detalleConfirma').innerHTML = html;
        document.getElementById('codUnicoDisplay').innerText = generarCodigo();
        toggle('modalConfirma');
    }

    async function finalizarGuardado() {
        const cod = document.getElementById('codUnicoDisplay').innerText;
        const itemsParaEnviar = [];
        for(let prd in itemsSeleccionados) {
            itemsParaEnviar.push({ prd: prd, cant: itemsSeleccionados[prd] });
        }

        await fetch(API, {method:'POST', body: JSON.stringify({
            action: 'addVentasMultiple',
            id: sID, nom: sNom, 
            items: itemsParaEnviar,
            codigoUnico: cod,
            metodo: document.getElementById('pagoMetodo').value,
            banco: document.getElementById('pagoBanco').value,
            compro: document.getElementById('pagoCompro').value
        })});

        alert("REGISTRO EXITOSO CON CÓDIGO: " + cod);
        location.reload();
    }

    // GESTIÓN DE PRODUCTOS (EDICIÓN)
    function renderAdminPrd() {
        const cont = document.getElementById('listaPrdAdmin');
        cont.innerHTML = dbPrd.map(p => `
            <div class="prd-item">
                <span>${p.nombre} ($${p.precio})</span>
                <button onclick="editarPrd('${p.nombre}', '${p.precio}')">✏️ EDITAR</button>
            </div>
        `).join('');
    }

    async function editarPrd(oldNom, oldPre) {
        const newNom = prompt("NUEVO NOMBRE:", oldNom);
        const newPre = prompt("NUEVO PRECIO:", oldPre);
        if(newNom && newPre) {
            await fetch(API, {method:'POST', body: JSON.stringify({
                action: 'editPrd', oldNom: oldNom, newNom: newNom, newPre: newPre
            })});
            cargar();
        }
    }

    // Funciones de búsqueda y auxiliares (Se mantienen de la v4)
    function buscarInteligente(el) {
        const b = el.value.toUpperCase().split(" ");
        const r = document.getElementById('resV');
        r.innerHTML = '';
        if(!el.value) { r.style.display='none'; return; }
        const f = dbEst.filter(e => b.every(t => (e.id + " " + e.nombre).includes(t)));
        f.forEach(e => {
            const d = document.createElement('div');
            d.style.padding='10px'; d.style.borderBottom='1px solid #EEE'; d.style.cursor='pointer';
            d.innerText = `[${e.id}] ${e.nombre}`;
            d.onclick = () => { sID=e.id; sNom=e.nombre; document.getElementById('selLabel').innerText="✅ "+sNom; r.style.display='none'; el.value=''; };
            r.appendChild(d);
        });
        r.style.display='block';
    }

    function toggle(id) {
        const x = document.getElementById(id);
        x.style.display = (x.style.display === 'flex' || x.style.display === 'block') ? 'none' : (id.includes('modal') ? 'flex' : 'block');
    }
    function togglePagoExtra() { document.getElementById('extraPago').classList.toggle('hidden', document.getElementById('pagoMetodo').value !== 'TRANSFERENCIA'); }
</script>
</body>
</html>
