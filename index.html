<div class="card">
    <div id="loadA" class="loader">Actualizando Base...</div>
    <span class="badge" id="count">0 Alumnos</span>
    <h3>⚙️ Gestión de Alumnos</h3>
    
    <div class="search-box">
        <input type="text" id="busA" placeholder="🔎 Buscar para editar o eliminar..." oninput="buscar(this, 'resA')">
        <div id="resA" class="res-list"></div>
    </div>
    
    <div id="editZone" style="display:none; margin-top:15px; padding:15px; border:2px solid #f39c12; border-radius:10px; position:relative;">
        <button onclick="cerrarEdicion()" style="position:absolute; right:10px; top:10px; border:none; background:none; cursor:pointer; font-weight:bold;">✖</button>
        <p style="margin:0 0 10px 0; font-weight:bold; color:#d35400;">📝 Editar / Eliminar Alumno</p>
        <label><small>ID (No editable):</small></label>
        <input type="text" id="edID" disabled style="background:#f0f0f0; margin-bottom:5px;">
        <label><small>Nombre Completo:</small></label>
        <input type="text" id="edNom">
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn" style="background:#f39c12; color:white;" onclick="actualizarEst()">ACTUALIZAR</button>
            <button class="btn btn-red" onclick="borrarEst()">ELIMINAR</button>
        </div>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbxoT6Cz6ascAEG-zRtO2qdoNi3J1hvbK-iCjKGAXXsRQUvs_ZcTvOodZNREdPDlj5ZE/exec"; // REEMPLAZA ESTO
    let dbEst = [], dbVent = [], sID = "", sNom = "";

    async function cargar() {
        try {
            const r = await fetch(URL_API + "?q=todo");
            const d = await r.json();
            dbEst = d.est; 
            dbVent = d.vent; // Carga los consumos
            document.getElementById('count').innerText = dbEst.length + " Alumnos";
        } catch(e) { console.error("Error al cargar"); }
    }

    function cerrarEdicion() {
        document.getElementById('editZone').style.display = 'none';
        sID = ""; sNom = "";
    }

    async function actualizarEst() {
        const nuevoNom = document.getElementById('edNom').value;
        if(!nuevoNom) return alert("El nombre no puede estar vacío");
        document.getElementById('loadA').style.display='block';
        await fetch(URL_API, {method:'POST', body:JSON.stringify({action:'editEst', id:sID, nom:nuevoNom})});
        alert("Datos actualizados correctamente");
        location.reload();
    }

    // El resto de funciones (buscar, registrar, filtrarH) permanecen igual, 
    // pero asegúrate de que filtrarH use dbVent.filter() correctamente.
</script>
