<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comedor CEIAF v8.0 - Gestión Total</title>
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #2ecc71; --d: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1400px; margin: auto; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        h3 { color: var(--p); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; transition: 0.3s; }
        .btn-blue { background: var(--a); color: white; }
        .btn-red { background: var(--d); color: white; }
        .btn-green { background: var(--s); color: white; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .search-box { position: relative; }
        .res-list { border: 1px solid #ddd; max-height: 150px; overflow-y: auto; display: none; background: white; position: absolute; width: 100%; z-index: 100; border-radius: 8px; }
        .res-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .res-item:hover { background: #f0f7ff; }
        .badge { background: var(--p); color: white; padding: 4px 10px; border-radius: 10px; font-size: 0.8em; float: right; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
        .filter-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab { flex: 1; padding: 5px; font-size: 0.75em; cursor: pointer; background: #eee; border-radius: 5px; text-align: center; }
        .tab.active { background: var(--a); color: white; }
        .loader { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); z-index: 1000; text-align: center; padding-top: 20%; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-grid">
    <div class="card">
        <div id="loadV" class="loader">Procesando...</div>
        <h3>📝 Registro de Consumo</h3>
        <div class="search-box">
            <input type="text" id="busV" placeholder="🔎 Buscar Estudiante para registrar..." oninput="buscar(this, 'resV')">
            <div id="resV" class="res-list"></div>
        </div>
        
        <p id="selLabel" style="padding:10px; background:#eef7ff; border-radius:8px; font-weight:bold; color:var(--a);">Alumno: Ninguno seleccionado</p>
        
        <select id="prd">
            <option value="Almuerzo">Almuerzo ($3.50)</option>
            <option value="Medio">Medio ($2.00)</option>
            <option value="Sopa">Sopa ($1.00)</option>
            <option value="Lunch">Lunch ($1.50)</option>
        </select>
        
        <button class="btn btn-blue" onclick="registrar()">💾 GUARDAR CONSUMO</button>

        <h3 style="margin-top:20px;">📊 Historial Individual</h3>
        <div class="filter-tabs">
            <div class="tab active" onclick="filtrarH('hoy', this)">Hoy</div>
            <div class="tab" onclick="filtrarH('semana', this)">Semana</div>
            <div class="tab" onclick="filtrarH('mes', this)">Mes</div>
        </div>
        <div id="hist" style="max-height: 200px; overflow-y: auto;">Selecciona un alumno...</div>
    </div>

    <div class="card">
        <div id="loadA" class="loader">Actualizando Base...</div>
        <span class="badge" id="count">0 Alumnos</span>
        <h3>⚙️ Gestión de Alumnos</h3>
        
        <details>
            <summary style="cursor:pointer; font-weight:bold; color:var(--s)">+ Añadir Nuevo</summary>
            <input type="text" id="nID" placeholder="ID / Cédula">
            <input type="text" id="nNom" placeholder="Nombre Completo">
            <button class="btn btn-green" onclick="nuevoEst()">CREAR ALUMNO</button>
        </details>

        <h3 style="margin-top:20px;">🗑️ Eliminar / Editar</h3>
        <div class="search-box">
            <input type="text" id="busA" placeholder="🔎 Buscar para eliminar o editar..." oninput="buscar(this, 'resA')">
            <div id="resA" class="res-list"></div>
        </div>
        
        <div id="editZone" style="display:none; margin-top:15px; padding:15px; border:2px solid var(--d); border-radius:10px;">
            <p style="margin:0; font-weight:bold;">Estudiante Seleccionado:</p>
            <input type="text" id="edID" disabled style="background:#f9f9f9">
            <input type="text" id="edNom">
            <button class="btn btn-red" onclick="borrarEst()">❌ ELIMINAR DE LA BASE</button>
        </div>

        <h3 style="margin-top:20px;">📥 Reportes Generales</h3>
        <button class="btn btn-blue" style="background:var(--p)" onclick="descargar()">DESCARGAR REPORTE EXCEL</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbz4MFVa_XByObnE2LYJ8aRNqXAZDpDMDt_1s9vr-lQ0xAFlYnpSBeLNDN5UBvJyOtCb/exec"; // REEMPLAZA ESTO
    let dbEst = [], dbVent = [], sID = "", sNom = "";

    async function cargar() {
        const r = await fetch(URL_API + "?q=todo");
        const d = await r.json();
        dbEst = d.est; dbVent = d.vent;
        document.getElementById('count').innerText = dbEst.length + " Alumnos";
    }

    function buscar(el, resId) {
        const v = el.value.toLowerCase();
        const r = document.getElementById(resId);
        r.innerHTML = '';
        if(v.length < 2) { r.style.display='none'; return; }
        const f = dbEst.filter(e => e.nombre.toLowerCase().includes(v) || e.id.toString().includes(v));
        f.forEach(e => {
            const d = document.createElement('div');
            d.className = 'res-item';
            d.innerText = `${e.id} | ${e.nombre}`;
            d.onclick = () => {
                sID = e.id; sNom = e.nombre;
                if(resId === 'resV') {
                    document.getElementById('selLabel').innerText = "✅ Seleccionado: " + sNom;
                    filtrarH('hoy');
                } else {
                    document.getElementById('editZone').style.display = 'block';
                    document.getElementById('edID').value = sID;
                    document.getElementById('edNom').value = sNom;
                }
                r.style.display = 'none';
                el.value = '';
            };
            r.appendChild(d);
        });
        r.style.display = 'block';
    }

    function filtrarH(periodo, el) {
        if(!sID) return;
        if(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        const hoy = new Date();
        const f = dbVent.filter(v => {
            if(v.id != sID) return false;
            const fV = new Date(v.fecha);
            if(periodo === 'hoy') return fV.toDateString() === hoy.toDateString();
            if(periodo === 'semana') return (hoy - fV) / (1000*60*60*24) <= 7;
            if(periodo === 'mes') return fV.getMonth() === hoy.getMonth();
            return true;
        });
        
        let h = "<table><tr><th>Fecha</th><th>Producto</th></tr>";
        f.reverse().forEach(v => h += `<tr><td>${v.fecha.split(',')[0]}</td><td>${v.prd}</td></tr>`);
        document.getElementById('hist').innerHTML = f.length ? h + "</table>" : "Sin registros en este periodo.";
    }

    async function registrar() {
        if(!sID) return alert("Selecciona un alumno primero");
        document.getElementById('loadV').style.display='block';
        await fetch(URL_API, {method:'POST', body:JSON.stringify({id:sID, nom:sNom, prd:document.getElementById('prd').value, met:'Efectivo'})});
        alert("Consumo Guardado");
        location.reload();
    }

    async function borrarEst() {
        if(!confirm("¿Seguro que quieres eliminar a este estudiante de la base de datos?")) return;
        document.getElementById('loadA').style.display='block';
        await fetch(URL_API, {method:'POST', body:JSON.stringify({action:'delEst', id:sID})});
        alert("Estudiante Eliminado");
        location.reload();
    }

    async function nuevoEst() {
        const id = document.getElementById('nID').value;
        const nom = document.getElementById('nNom').value;
        if(!id || !nom) return alert("Completa todos los campos");
        document.getElementById('loadA').style.display='block';
        await fetch(URL_API, {method:'POST', body:JSON.stringify({action:'newEst', id:id, nom:nom})});
        location.reload();
    }

    function descargar() { window.open(URL_API + "?q=excel&tipo=General"); }

    window.onload = cargar;
</script>
</body>
</html>
