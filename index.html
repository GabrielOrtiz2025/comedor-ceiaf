<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Comedor CEIAF - Pro</title>
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #2ecc71; --d: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; max-width: 1200px; margin: auto; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2, h3 { color: var(--p); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        
        /* Botones de Venta Rápidos (Los que querías mantener) */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .btn-v { background: var(--a); color: white; border: none; font-weight: bold; cursor: pointer; padding: 15px; transition: 0.3s; }
        .btn-v:hover { background: #2980b9; }

        /* Estilo para Configuración (Verde) */
        .btn-save { background: var(--s); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-report { background: var(--p); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .search-res { border: 1px solid #ddd; max-height: 150px; overflow-y: auto; display: none; background: white; position: absolute; width: 95%; z-index: 10; border-radius: 8px; }
        .res-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .res-item:hover { background: #f0f7ff; }
        .loader { display: none; color: var(--a); font-weight: bold; text-align: center; padding: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="main-grid">
    <div class="card">
        <h2>📝 Registrar Consumo</h2>
        <div id="loading" class="loader">⌛ Procesando...</div>
        
        <div style="position: relative;">
            <input type="text" id="bus" placeholder="Buscar por Nombre o ID..." oninput="buscar()">
            <div id="res" class="search-res"></div>
        </div>
        <p id="estSel" style="font-weight: bold; color: var(--a); font-size: 1.1em;">Estudiante: Ninguno</p>

        <div class="btn-grid">
            <button class="btn-v" onclick="vender('Almuerzo', 3.50)">ALMUERZO ($3.50)</button>
            <button class="btn-v" onclick="vender('Medio', 2.00)">MEDIO ($2.00)</button>
            <button class="btn-v" onclick="vender('Sopa', 1.00)">SOPA ($1.00)</button>
            <button class="btn-v" onclick="vender('Lunch', 1.50)">LUNCH ($1.50)</button>
        </div>

        <div style="background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px dashed #ccc;">
            <label><input type="radio" name="met" value="Efectivo" checked> Efectivo</label><br>
            <label><input type="radio" name="met" value="Transferencia"> Transferencia</label>
            <input type="text" id="com" placeholder="N° Comprobante (si aplica)">
        </div>
        <button class="btn-save" style="margin-top:15px; background: var(--a);" onclick="vender('Personalizado', 0)">💾 GUARDAR REGISTRO MANUAL</button>
    </div>

    <div class="card">
        <h2>⚙️ Configuración</h2>
        
        <details open>
            <summary style="font-weight: bold; cursor: pointer;">➕ Añadir Estudiante</summary>
            <input type="text" id="nID" placeholder="ID (Cédula)">
            <input type="text" id="nNom" placeholder="Nombre Completo">
            <button class="btn-save" onclick="crearAlumno()">Añadir</button>
        </details>

        <hr>

        <h3>📊 Reportes</h3>
        <select id="repTipo">
            <option value="General">Reporte General</option>
            <option value="Hoy">Consumos de Hoy</option>
        </select>
        <button class="btn-report" onclick="descargarExcel()">📥 DESCARGAR EXCEL</button>

        <hr>

        <h3>🕒 Últimos Movimientos</h3>
        <div id="hist" style="max-height: 200px; overflow-y: auto;">
            Selecciona un alumno para ver historial...
        </div>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbxhozVDfHvwNkl0IYJmDzcx_PdbwdrJYoOQxhkFGfgF-fHBp9UmkgBNN8vfVe3A_24a/exec"; 

    let dbEst = [], dbVent = [], selID = "", selNom = "";

    async function cargar() {
        try {
            const r = await fetch(URL_API + "?q=todo");
            const d = await r.json();
            dbEst = d.est; dbVent = d.vent;
        } catch(e) { console.error("Error al cargar datos"); }
    }

    function buscar() {
        const v = document.getElementById('bus').value.toLowerCase();
        const r = document.getElementById('res');
        r.innerHTML = '';
        if(v.length < 2) { r.style.display='none'; return; }
        const f = dbEst.filter(e => e.id.toString().toLowerCase().includes(v) || e.nombre.toLowerCase().includes(v));
        f.forEach(e => {
            const d = document.createElement('div');
            d.className = 'res-item';
            d.innerText = `${e.id} | ${e.nombre}`;
            d.onclick = () => {
                selID = e.id; selNom = e.nombre;
                document.getElementById('estSel').innerText = "Estudiante: " + selNom;
                document.getElementById('res').style.display = 'none';
                document.getElementById('bus').value = '';
                verHistorial();
            };
            r.appendChild(d);
        });
        r.style.display = 'block';
    }

    async function vender(p, pr) {
        if(!selID) return alert("❌ Selecciona un estudiante primero");
        document.getElementById('loading').style.display = 'block';
        const met = document.querySelector('input[name="met"]:checked').value;
        const com = document.getElementById('com').value || "-";
        
        const f = { id: selID, nom: selNom, prd: p, pre: pr, met: met, com: com, ban: "-" };
        
        try {
            await fetch(URL_API, { method: 'POST', body: JSON.stringify(f), mode: 'no-cors' });
            alert("✅ Registro guardado con éxito");
            dbVent.push({fecha: new Date().toLocaleString(), ...f});
            verHistorial();
        } catch(e) { alert("Error de conexión"); }
        document.getElementById('loading').style.display = 'none';
    }

    async function crearAlumno() {
        const id = document.getElementById('nID').value;
        const nom = document.getElementById('nNom').value;
        if(!id || !nom) return alert("Completa ID y Nombre");
        document.getElementById('loading').style.display = 'block';
        try {
            await fetch(URL_API, { method: 'POST', body: JSON.stringify({action:"newEst", id:id, nom:nom}), mode: 'no-cors' });
            alert("👤 Alumno añadido correctamente");
            dbEst.push({id: id, nombre: nom});
            document.getElementById('nID').value = ''; document.getElementById('nNom').value = '';
        } catch(e) { alert("Error al guardar"); }
        document.getElementById('loading').style.display = 'none';
    }

    function verHistorial() {
        const f = dbVent.filter(v => v.id == selID);
        let h = '<table><tr><th>Fecha</th><th>Producto</th></tr>';
        f.reverse().slice(0,5).forEach(v => {
            h += `<tr><td>${v.fecha.split(',')[0]}</td><td>${v.prd}</td></tr>`;
        });
        document.getElementById('hist').innerHTML = f.length ? h + '</table>' : 'Sin consumos recientes';
    }

    function descargarExcel() {
        window.open(URL_API + "?q=excel&tipo=" + document.getElementById('repTipo').value);
    }

    window.onload = cargar;
</script>
</body>
</html>
