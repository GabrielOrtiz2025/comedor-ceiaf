<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Comedor CEIAF v4.0</title>
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #2ecc71; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h3 { color: var(--p); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-blue { background: var(--a); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-green { background: var(--s); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-dark { background: var(--p); color: white; border: none; font-weight: bold; cursor: pointer; }
        .search-res { border: 1px solid #ddd; max-height: 150px; overflow-y: auto; display: none; background: white; position: absolute; width: 95%; z-index: 10; }
        .res-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .res-item:hover { background: #f0f7ff; }
        details { margin-bottom: 10px; padding: 10px; border: 1px solid #eee; border-radius: 8px; }
        summary { font-weight: bold; cursor: pointer; color: var(--p); }
    </style>
</head>
<body>

<div class="main-grid">
    <div class="card">
        <h3>📝 Registrar Consumo</h3>
        <div style="position: relative;">
            <input type="text" id="bus" placeholder="Buscar por Nombre o ID..." oninput="buscar()">
            <div id="res" class="search-res"></div>
        </div>
        <p id="estSel" style="font-weight: bold; color: var(--a);">Estudiante: No seleccionado</p>
        
        <select id="prd">
            <option value="Almuerzo">Almuerzo ($3.50)</option>
            <option value="Medio">Medio ($2.00)</option>
            <option value="Sopa">Sopa ($1.00)</option>
            <option value="Lunch">Lunch ($1.50)</option>
        </select>
        
        <div style="padding: 10px; border: 1px dashed #ccc; border-radius: 8px; margin: 10px 0;">
            <label><input type="radio" name="met" value="Efectivo" checked> Efectivo</label><br>
            <label><input type="radio" name="met" value="Transferencia"> Transferencia</label>
        </div>
        
        <button class="btn-blue" onclick="guardarVenta()">💾 GUARDAR REGISTRO</button>
    </div>

    <div class="card">
        <h3>⚙️ Configuración</h3>
        
        <details>
            <summary>▶ Añadir Estudiante</summary>
            <input type="text" id="nID" placeholder="ID (Cédula)">
            <input type="text" id="nNom" placeholder="Nombre Completo">
            <button class="btn-green" onclick="crearAlumno()">Añadir</button>
        </details>

        <details>
            <summary>▶ Menú y Precios</summary>
            <input type="text" id="mItem" placeholder="Item">
            <input type="number" id="mPrecio" placeholder="Precio $">
            <button class="btn-green">Añadir</button>
        </details>

        <h3>📊 Reportes</h3>
        <select id="repTipo">
            <option value="General">Reporte General</option>
            <option value="Hoy">Consumos de Hoy</option>
        </select>
        <button class="btn-dark" onclick="descargarExcel()">📥 DESCARGAR EXCEL</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbxhozVDfHvwNkl0IYJmDzcx_PdbwdrJYoOQxhkFGfgF-fHBp9UmkgBNN8vfVe3A_24a/exec";

    let dbEst = [], selID = "", selNom = "";

    async function cargar() {
        const r = await fetch(URL_API + "?q=todo");
        const d = await r.json();
        dbEst = d.est;
    }

    function buscar() {
        const v = document.getElementById('bus').value.toLowerCase();
        const r = document.getElementById('res');
        r.innerHTML = '';
        if(v.length < 2) { r.style.display='none'; return; }
        const f = dbEst.filter(e => e.id.toString().toLowerCase().includes(v) || e.nombre.toLowerCase().includes(v));
        f.forEach(e => {
            const d = document.createElement('div');
            d.className = 'res-item';
            d.innerText = `${e.id} | ${e.nombre}`;
            d.onclick = () => {
                selID = e.id; selNom = e.nombre;
                document.getElementById('estSel').innerText = "Estudiante: " + selNom;
                document.getElementById('res').style.display = 'none';
                document.getElementById('bus').value = '';
            };
            r.appendChild(d);
        });
        r.style.display = 'block';
    }

    async function guardarVenta() {
        if(!selID) return alert("Selecciona un estudiante");
        const p = document.getElementById('prd').value;
        const m = document.querySelector('input[name="met"]:checked').value;
        await fetch(URL_API, { method: 'POST', body: JSON.stringify({id:selID, nom:selNom, prd:p, met:m}), mode: 'no-cors' });
        alert("✅ Registro guardado");
    }

    async function crearAlumno() {
        const id = document.getElementById('nID').value;
        const nom = document.getElementById('nNom').value;
        if(!id || !nom) return alert("Llena los campos");
        await fetch(URL_API, { method: 'POST', body: JSON.stringify({action:"newEst", id:id, nom:nom}), mode: 'no-cors' });
        alert("👤 Alumno añadido");
        dbEst.push({id:id, nombre:nom});
    }

    function descargarExcel() {
        // Redirección directa para evitar que se quede en la pantalla blanca de Google
        const tipo = document.getElementById('repTipo').value;
        window.location.href = URL_API + "?q=excel&tipo=" + tipo;
    }

    window.onload = cargar;
</script>
</body>
</html>
