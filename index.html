<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA BAR - CEIAF</title>
    <style>
        :root { --p: #2C3E50; --a: #3498DB; --s: #2ECC71; --d: #E74C3C; --bg: #F4F7F6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); text-transform: uppercase; font-size: 13px; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        h2 { color: var(--p); border-bottom: 2px solid #EEE; padding-bottom: 8px; margin-top: 0; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #DDD; border-radius: 6px; text-transform: uppercase; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; color: white; margin: 5px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-blue { background: var(--a); } .btn-red { background: var(--d); } .btn-green { background: var(--s); }
        .dropdown-box { border: 1px solid #DDD; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; background: #F9F9F9; }
        .tabs { display: flex; gap: 5px; margin: 15px 0; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #EEE; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab.active { background: var(--a); color: white; }
        .table-wrap { max-height: 300px; overflow-y: auto; border: 1px solid #EEE; background: white; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #EEE; }
        .hidden { display: none; }
        .search-results { border: 1px solid #DDD; display: none; background: white; position: absolute; width: calc(100% - 40px); z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .loader-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.7); display:none; align-items:center; justify-content:center; z-index:1000; font-weight:bold; }
    </style>
</head>
<body>

<div class="container">
    <!-- REGISTRO -->
    <div class="card">
        <div id="loaderV" class="loader-overlay">PROCESANDO...</div>
        <h2>🍴 REGISTRO DE CONSUMO</h2>
        <input type="text" id="busV" placeholder="🔎 BUSCAR POR ID (9B) O NOMBRE..." oninput="buscar(this, 'resV')">
        <div id="resV" class="search-results"></div>
        
        <div id="selLabel" style="padding:15px; background:#E3F2FD; color:#1565C0; font-weight:bold; margin: 10px 0; border-radius: 6px;">
            ALUMNO: NINGUNO SELECCIONADO
        </div>

        <select id="prdSelect"></select>
        
        <select id="pagoMetodo" onchange="togglePagoExtra()">
            <option value="EFECTIVO">PAGO: EFECTIVO</option>
            <option value="TRANSFERENCIA">PAGO: TRANSFERENCIA</option>
        </select>

        <div id="extraPago" class="hidden">
            <input type="text" id="pagoBanco" placeholder="ENTIDAD BANCARIA">
            <input type="text" id="pagoCompro" placeholder="NÚMERO DE COMPROBANTE">
        </div>

        <button class="btn btn-blue" onclick="registrar()">💾 GUARDAR CONSUMO</button>

        <h2 style="margin-top:25px;">📊 DETALLE INDIVIDUAL</h2>
        <div class="tabs">
            <div id="t-hoy" class="tab active" onclick="setPeriodo('hoy')">HOY</div>
            <div id="t-semana" class="tab" onclick="setPeriodo('semana')">SEMANA</div>
            <div id="t-mes" class="tab" onclick="setPeriodo('mes')">MES</div>
        </div>
        <div id="historialIndividual" class="table-wrap">SELECCIONE UN ALUMNO PARA VER DETALLES...</div>
        
        <div id="opcionesDescargaIndiv" class="hidden">
            <button class="btn" style="background:#34495E" onclick="descargarIndividual()">📥 DESCARGAR HISTORIAL SELECCIONADO (<span id="txtPeriodo">HOY</span>)</button>
        </div>
    </div>

    <!-- ADMINISTRACION -->
    <div class="card">
        <div id="loaderA" class="loader-overlay" style="display:flex;">SINCRONIZANDO...</div>
        <h2>⚙️ GESTIÓN DEL SISTEMA</h2>
        
        <button class="btn btn-blue" onclick="toggle('dropAlumnos')">▼ VER LISTADO DE ALUMNOS</button>
        <div id="dropAlumnos" class="dropdown-box">
            <input type="text" id="fLista" placeholder="FILTRAR LISTA..." oninput="renderAlumnos()">
            <div id="listaAlumnosCont" class="table-wrap"></div>
        </div>

        <button class="btn btn-green" onclick="toggle('dropNuevo')">+ AÑADIR NUEVO ALUMNO</button>
        <div id="dropNuevo" class="dropdown-box">
            <div style="display:flex; gap:5px;">
                <input type="number" id="nNivel" placeholder="NIVEL">
                <input type="text" id="nParalelo" placeholder="PARALELO">
            </div>
            <input type="text" id="nNombre" placeholder="NOMBRE COMPLETO">
            <input type="number" id="nTelf" placeholder="TELÉFONO REPRESENTANTE (10 DÍGITOS)">
            <button class="btn btn-green" onclick="crearAlumno()">GUARDAR ALUMNO</button>
        </div>

        <button class="btn btn-blue" onclick="toggle('dropPrd')">🍲 GESTIONAR PRODUCTOS</button>
        <div id="dropPrd" class="dropdown-box">
            <input type="text" id="pn" placeholder="NOMBRE DEL PLATO">
            <input type="number" id="pp" placeholder="PRECIO">
            <button class="btn btn-blue" onclick="crearPrd()">AÑADIR PRODUCTO</button>
            <div id="listaPrd" class="table-wrap"></div>
        </div>

        <button class="btn btn-red" onclick="toggle('dropDanger')">⚠ ZONA DE PELIGRO</button>
        <div id="dropDanger" class="dropdown-box" style="border: 2px solid var(--d);">
            <p style="color:var(--d); font-weight:bold; margin-bottom:10px;">ESTA ACCIÓN ARCHIVA TODO Y LIMPIA EL REGISTRO DE VENTAS.</p>
            <button class="btn btn-red" onclick="reestablecerPeriodo()">REESTABLECER PERÍODO LECTIVO</button>
        </div>
        
        <hr style="margin:20px 0;">
        <h3>📥 DESCARGAS GENERALES</h3>
        <div style="display:flex; gap:5px; align-items:center;">
            <input type="date" id="dDesde"> A <input type="date" id="dHasta">
        </div>
        <button class="btn" style="background:#2C3E50" onclick="descargarGeneral()">DESCARGAR REGISTRO GENERAL POR RANGO</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbyJ9SLVbw0InuSMoAOlzUoIQGNCj3NjV0QLyR2BNTZS5q4EfsjgbF7LvWuyj4TTrwwJ/exec"; 
    let dbEst = [], dbVent = [], dbPrd = [], sID = "", sNom = "", PERIODO = "hoy";

    async function cargar() {
        try {
            const r = await fetch(API);
            const d = await r.json();
            dbEst = d.est; dbVent = d.vent; dbPrd = d.prd;
            renderAlumnos(); renderComboPrd(); renderListaPrd();
            if(sID) renderHistorial();
            document.getElementById('loaderA').style.display = 'none';
        } catch(e) { alert("ERROR DE CONEXIÓN"); }
    }
    window.onload = cargar;

    function toggle(id) {
        const x = document.getElementById(id);
        x.style.display = (x.style.display === 'block') ? 'none' : 'block';
    }

    function togglePagoExtra() {
        const m = document.getElementById('pagoMetodo').value;
        document.getElementById('extraPago').classList.toggle('hidden', m !== 'TRANSFERENCIA');
    }

    function setPeriodo(p) {
        PERIODO = p;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-'+p).classList.add('active');
        document.getElementById('txtPeriodo').innerText = p.toUpperCase();
        renderHistorial();
    }

    function buscar(el, resId) {
        const v = el.value.toUpperCase();
        const r = document.getElementById(resId);
        r.innerHTML = '';
        if(v.length < 1) { r.style.display='none'; return; }
        const f = dbEst.filter(e => e.id.includes(v) || e.nombre.includes(v));
        f.forEach(e => {
            const d = document.createElement('div');
            d.style.padding = '12px'; d.style.cursor = 'pointer'; d.style.borderBottom = '1px solid #EEE';
            d.innerText = `[${e.id}] ${e.nombre}`;
            d.onclick = () => {
                sID = e.id; sNom = e.nombre;
                document.getElementById('selLabel').innerText = "✅ " + sNom;
                document.getElementById('opcionesDescargaIndiv').classList.remove('hidden');
                renderHistorial(); r.style.display='none'; el.value='';
            };
            r.appendChild(d);
        });
        r.style.display = 'block';
    }

    async function registrar() {
        if(!sID) return alert("SELECCIONE UN ALUMNO");
        const met = document.getElementById('pagoMetodo').value;
        const ban = document.getElementById('pagoBanco').value;
        const com = document.getElementById('pagoCompro').value;

        if(met === 'TRANSFERENCIA' && (!ban || !com)) return alert("DATOS DE TRANSFERENCIA INCOMPLETOS");

        document.getElementById('loaderV').style.display = 'flex';
        try {
            await fetch(API, {method:'POST', body: JSON.stringify({
                id: sID, nom: sNom, prd: document.getElementById('prdSelect').value,
                metodo: met, banco: ban, comprobante: com
            })});
            await cargar();
            alert("CONSUMO GUARDADO");
        } catch(e) { alert("ERROR AL GUARDAR"); }
        document.getElementById('loaderV').style.display = 'none';
    }

    function renderHistorial() {
        if(!sID) return;
        const hoy = new Date();
        const filtradas = dbVent.filter(v => {
            if(v.id.toString() !== sID.toString()) return false;
            const fV = new Date(v.fecha);
            if(PERIODO === 'hoy') return fV.toDateString() === hoy.toDateString();
            if(PERIODO === 'semana') return (hoy - fV) / (1000*60*60*24) <= 7;
            if(PERIODO === 'mes') return (hoy - fV) / (1000*60*60*24) <= 30;
            return true;
        });

        let h = "<table><tr><th>FECHA</th><th>PRODUCTO</th><th>🗑</th></tr>";
        filtradas.reverse().forEach(v => {
            h += `<tr><td>${new Date(v.fecha).toLocaleDateString()}</td><td>${v.prd}</td><td><button style="border:none;background:none;cursor:pointer;" onclick="borrarConsumo(${v.row})">🗑</button></td></tr>`;
        });
        document.getElementById('historialIndividual').innerHTML = h + "</table>";
    }

    async function crearAlumno() {
        const niv = document.getElementById('nNivel').value;
        const par = document.getElementById('nParalelo').value.toUpperCase();
        const nom = document.getElementById('nNombre').value.toUpperCase();
        const tel = document.getElementById('nTelf').value;
        
        if(!niv || !par || !nom || tel.length !== 10) return alert("REVISE LOS DATOS. EL TELÉFONO DEBE TENER 10 DÍGITOS.");

        document.getElementById('loaderA').style.display = 'flex';
        const res = await fetch(API, {method:'POST', body: JSON.stringify({action:'addEst', id: niv+par, nom: nom, telf: tel})});
        const texto = await res.text();
        if(texto === "DUPLICADO") alert("EL ALUMNO YA EXISTE");
        await cargar();
        document.getElementById('loaderA').style.display = 'none';
    }

    async function reestablecerPeriodo() {
        alert("SISTEMA: ANTES DE REESTABLECER, DEBE DESCARGAR EL REGISTRO GENERAL PARA NO PERDER INFORMACIÓN.");
        descargarGeneral();
        if(confirm("¿CONFIRMA QUE YA DESCARGÓ EL RESPALDO Y DESEA LIMPIAR LAS VENTAS?")) {
            document.getElementById('loaderA').style.display = 'flex';
            await fetch(API, {method:'POST', body: JSON.stringify({action:'nuevoPeriodo'})});
            location.reload();
        }
    }

    function descargarIndividual() {
        const filtradas = dbVent.filter(v => {
            if(v.id.toString() !== sID.toString()) return false;
            const fV = new Date(v.fecha);
            const hoy = new Date();
            if(PERIODO === 'hoy') return fV.toDateString() === hoy.toDateString();
            if(PERIODO === 'semana') return (hoy - fV) / (1000*60*60*24) <= 7;
            if(PERIODO === 'mes') return (hoy - fV) / (1000*60*60*24) <= 30;
            return true;
        });
        generarCSV(filtradas, `REPORTE_${sNom}_${PERIODO}`);
    }

    function descargarGeneral() {
        const d = document.getElementById('dDesde').value;
        const h = document.getElementById('dHasta').value;
        let datos = dbVent;
        if(d && h) {
            datos = dbVent.filter(v => {
                const f = new Date(v.fecha);
                return f >= new Date(d) && f <= new Date(h);
            });
        }
        generarCSV(datos, "REPORTE_GENERAL");
    }

    function generarCSV(datos, nombre) {
        let csv = "FECHA,ID,NOMBRE,PRODUCTO,METODO,BANCO,COMPROBANTE\n";
        datos.forEach(v => csv += `${new Date(v.fecha).toLocaleString()},${v.id},${v.nom},${v.prd},${v.metodo},${v.banco},${v.comprobante}\n`);
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = window.URL.createObjectURL(blob);
        a.download = nombre + ".csv";
        a.click();
    }

    function renderAlumnos() {
        const f = document.getElementById('fLista').value.toUpperCase();
        const lista = dbEst.filter(e => e.nombre.includes(f) || e.id.includes(f));
        let h = "<table><tr><th>ID</th><th>NOMBRE</th><th>TEL</th><th>⚙</th></tr>";
        lista.forEach(e => {
            h += `<tr><td>${e.id}</td><td>${e.nombre}</td><td>${e.telf}</td><td><button onclick="resetearAlumno('${e.id}')">🔄</button></td></tr>`;
        });
        document.getElementById('listaAlumnosCont').innerHTML = h + "</table>";
    }

    async function resetearAlumno(id) { if(confirm("¿RESETEAR CONSUMOS?")) { await fetch(API, {method:'POST', body: JSON.stringify({action:'resetEst', id:id})}); cargar(); } }
    function renderComboPrd() { document.getElementById('prdSelect').innerHTML = dbPrd.map(p => `<option value="${p.nombre} ($${p.precio})">${p.nombre} ($${p.precio})</option>`).join(''); }
    function renderListaPrd() {
        let h = "<table>";
        dbPrd.forEach(p => h += `<tr><td>${p.nombre}</td><td><button onclick="borrarPrd('${p.nombre}')">🗑</button></td></tr>`);
        document.getElementById('listaPrd').innerHTML = h + "</table>";
    }
    async function crearPrd() {
        const n = document.getElementById('pn').value; const p = document.getElementById('pp').value;
        await fetch(API, {method:'POST', body: JSON.stringify({action:'addPrd', nombre:n, precio:p})});
        cargar();
    }
    async function borrarPrd(n) { if(confirm("¿ELIMINAR PRODUCTO?")) { await fetch(API, {method:'POST', body: JSON.stringify({action:'delPrd', nombre:n})}); cargar(); } }
    async function borrarConsumo(row) { if(confirm("¿ELIMINAR ESTE CONSUMO?")) { await fetch(API, {method:'POST', body: JSON.stringify({action:'delVent', row:row})}); cargar(); } }
</script>
</body>
</html>
